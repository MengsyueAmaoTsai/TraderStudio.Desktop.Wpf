name: .NET WPF Continuous Integration

on:
  push:
    branches: [ "master" ]
  
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    strategy:
      matrix:
        targetPlatform: [x86, x64]
    
    runs-on: windows-latest
    
    env:
      # DotNet_Version: 8.0.x
      Solution_Path: ./RichillCapital.TraderStudio.Desktop.sln
      Wap_Project_Directory: ./Packaging/RichillCapital.TraderStudio.Desktop.Package
      Wap_Project_Path: ./Packaging/RichillCapital.TraderStudio.Desktop.Package/RichillCapital.TraderStudio.Desktop.Package.wapproj.
      WPF_Project_Path: ./RichillCapital.TraderStudio.Desktop.csproj
      App_Packages_Directory: AppPackages

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Use Nerdbank.GitVersioning 
      uses: dotnet/nbgv@master
      id: nbgv

    # INSTEAD OF USING CAKE TOOL
    # - name: Setup .NET Workload
    #   uses: actions/setup-dotnet@v4
    #   with:
    #     dotnet-version: ${{ env.DotNet_Version }}

    - name: Setup MSBuild.exe
      uses: microsoft/setup-msbuild@v2

    - name: Build and Tests with Cake Tool
      uses: cake-build/cake-action@v2
      with:
        script-path: build.cake
        target: default
        verbosity: Diagnostic
    
        # INSTEAD OF USING CAKE TOOL
        # - name: Restore Depdenencies
        #   run: dotnet restore $env:Solution_Path
        
        # - name: Build WPF Application Project
        #   run: dotnet build $env:WPF_Project_Path -c Release --no-restore
      
    # TODO: Decode certificate
    # TODO: Update Manifest file with version number
    
    - name: Publish Artifact
      run: msbuild $env:Solution_File /p:Platform=$env:TargetPlatform /p:Configuration=$env:Configuration /p:UapAppxPackageBuildMode=$env:BuildMode /p:AppxBundle=$env:AppxBundle
      env:
        AppxBundle: Never
        BuildMode: SideloadOnly
        Configuration: Release
        TargetPlatform: ${{ matrix.targetPlatform }}

    # TODO: Remove certificate

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MSIX Package
        path: ${{ env.Wap_Project_Directory}}/${{ env.App_Packages_Directory }}