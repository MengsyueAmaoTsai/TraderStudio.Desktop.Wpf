name: .NET WPF Continuous Integration

on:
  push:
    branches: [ "master" ]
  
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    strategy:
      matrix:
        targetPlatform: [x86, x64]
    
    runs-on: windows-latest
    
    env:
      DotNet_Version: 8.0.x
      Solution_Name: ./RichillCapital.TraderStudio.Desktop.sln
      Wap_Project_Directory: ./Packaging/RichillCapital.TraderStudio.Desktop.Package
      Wap_Project_Path: ./Packaging/RichillCapital.TraderStudio.Desktop.Package/RichillCapital.TraderStudio.Desktop.Package.wapproj.
      SigningCertificate: ./RichillCapital.TraderStudio.Desktop.pfx

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET Workload
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DotNet_Version }}

    - name: Setup MSBuild.exe
      uses: microsoft/setup-msbuild@v2

    - name: Decode Base64 encdoed certificate
      run: |
        $pfx_cert_byte = [System.Convert]::FromBase64String("${{ secrets.Base64_Encoded_Pfx }}")
        $currentDirecotry = Get-Location
        $certificatePath = Join-Path -Path $currentDirectory -ChildPath $env:Wap_Project_Directory -AdditionalChildPath $env:SigningCertificate
        [IO.File]::WriteAllBytes("$certificatePath", $pfx_cert_byte)

    - name: Restore depdenencies
      run: msbuild $env:Solution_Name /t:Restore /p:Configuration=$env:Configuration /p:RuntimeIdentifier=$env:RuntimeIdentifier
      env:
        Configuration: Debug
        RuntimeIdentifier: win-${{ matrix.targetPlatform }}
    
    # Build
    # Test
    # Publish