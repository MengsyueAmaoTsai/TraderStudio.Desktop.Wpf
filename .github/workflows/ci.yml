name: .NET WPF Continuous Integration

on:
  push:
    branches: [ "master" ]
  
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    strategy:
      matrix:
        targetplatform: [x86, x64]
    
    runs-on: windows-latest
    
    env:
      DotNet_Version: 8.0.x
      Solution_Name: ./RichillCapital.TraderStudio.Desktop.sln
      Wap_Project_Directory: ./Packaging/RichillCapital.TraderStudio.Desktop.Package
      Wap_Project_Path: ./Packaging/RichillCapital.TraderStudio.Desktop.Package/RichillCapital.TraderStudio.Desktop.Package.wapproj.
      SigningCertificate: ./RichillCapital.TraderStudio.Desktop.pfx

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET Workload
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DotNet_Version }}

    - name: Setup MSBuild.exe
      uses: microsoft/setup-msbuild@v2
    
    # Decode pfx

    - name: Restore depdenencies
      run: dotnet restore $env:Solution_Name
      # run: msbuild $env:Solution_Name /t:Restore /p:Configuration=$env:Configuration /p:RuntimeIdentifier=$env:RuntimeIdentifier
      # env:
      #   Configuration: Debug
      #   RuntimeIdentifier: win-${{ matrix.targetplatform }}
    
    - name: Build the Windows Application Packaging Project (wapproj)
      run: msbuild $env:Solution_File /p:Platform=$env:TargetPlatform /p:Configuration=$env:Configuration /p:UapAppxPackageBuildMode=$env:BuildMode /p:AppxBundle=$env:AppxBundle
      env:
        AppxBundle: Never
        BuildMode: SideloadOnly
        Configuration: Debug
        TargetPlatform: ${{ matrix.targetplatform }}

    # Remove the .pfx

    # Upload the MSIX package: https://github.com/marketplace/actions/upload-artifact
        